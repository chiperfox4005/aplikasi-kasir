<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Sistem Kasir</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.login-box {
    background: #2c2c2c;
    padding: 30px;
    width: 320px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
}

.login-box h2 {
    text-align: center;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-bottom: 15px;
    border: none;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 10px;
    background: #00b894;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #00a383;
}

.time {
    text-align: center;
    margin-bottom: 15px;
    font-size: 14px;
}

.error {
    color: #ff7675;
    font-size: 13px;
    text-align: center;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Welcome MnR Camp</h2>

    <div class="time" id="clock"></div>

    <input type="text" id="nama" placeholder="Nama">

    <select id="jabatan" onchange="togglePassword()">
        <option value="Kasir">Kasir</option>
        <option value="Owner">Owner</option>
    </select>

    <input type="password" id="password" placeholder="Password Owner" style="display:none;">

    <button onclick="login()">MASUK</button>

    <div class="error" id="error"></div>
</div>

<script>
function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();


function togglePassword() {
    const jabatan = document.getElementById("jabatan").value;
    const passwordField = document.getElementById("password");

    if (jabatan === "Owner") {
        passwordField.style.display = "block";
    } else {
        passwordField.style.display = "none";
    }
}


function login() {
    const nama = document.getElementById("nama").value;
    const jabatan = document.getElementById("jabatan").value;
    const password = document.getElementById("password").value;

    const errorBox = document.getElementById("error");
    errorBox.innerText = "";

    if (nama === "") {
        errorBox.innerText = "Nama tidak boleh kosong!";
        return;
    }

    if (jabatan === "Owner") {
        if (password !== "admin123") {
            errorBox.innerText = "Password Owner salah!";
            return;
        }
        window.api.bukaOwner();
    } else {
        window.api.bukaKasir();
    }

    localStorage.setItem("namaUser", nama);
    localStorage.setItem("role", jabatan);
}
</script>

</body>
</html>
