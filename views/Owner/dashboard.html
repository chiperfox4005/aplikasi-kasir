<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - PT System </title>
    <link rel="stylesheet" href="../../assets/style.css">
    <link rel="stylesheet" href="../../assets/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>TOKO SYSTEM </h2>
        </div>
        <nav class="sidebar-nav">
            <button onclick="location.href='dashboard.html'" class="nav-item active">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </button>
            <button onclick="location.href='manajemen.html'" class="nav-item">
                <i class="fas fa-box"></i>
                <span>Manajemen Produk</span>
            </button>
            <button onclick="location.href='database.html'" class="nav-item">
                <i class="fas fa-database"></i>
                <span>Database</span>
            </button>
            <button onclick="location.href='kategori.html'" class="nav-item">
                <i class="fas fa-tags"></i>
                <span>Kategori</span>
            </button>
            <button onclick="location.href='keuangan.html'" class="nav-item">
                <i class="fas fa-chart-pie"></i>
                <span>Keuangan</span>
            </button>
        </nav>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <!-- WELCOME -->
        <div class="welcome-section">
            <h1>Selamat Datang</h1>
            <p>Monitor performa toko anda</p>
        </div>

        <!-- STATS GRID -->
        <div class="stats-grid">
            <div class="stat-card primary">
                <div class="stat-icon">
                    <i class="fas fa-boxes-stacked"></i>
                </div>
                <div class="stat-content">
                    <h3>Total Produk</h3>
                    <p id="sumProduk" class="stat-number">0</p>
                    <span class="stat-change positive">+12% dari bulan lalu</span>
                </div>
            </div>

            <div class="stat-card success">
                <div class="stat-icon">
                    <i class="fas fa-coins"></i>
                </div>
                <div class="stat-content">
                    <h3>Total Omzet</h3>
                    <p id="sumOmzet" class="stat-number">Rp 0</p>
                    <span class="stat-change positive">+28% bulan ini</span>
                </div>
            </div>

            <div class="stat-card warning">
                <div class="stat-icon">
                    <i class="fas fa-fire"></i>
                </div>
                <div class="stat-content">
                    <h3>Produk Terlaris</h3>
                    <p id="topProduk" class="stat-number">Nasi Goreng</p>
                    <span class="stat-change positive">245 porsi</span>
                </div>
            </div>

            <div class="stat-card danger">
                <div class="stat-icon">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <div class="stat-content">
                    <h3>Stok Menipis</h3>
                    <p id="stokKritis" class="stat-number">3</p>
                    <span class="stat-change negative">-2 item</span>
                </div>
            </div>
        </div>

        <!-- CHARTS -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="card-header">
                    <h3>Grafik Penjualan Mingguan</h3>
                    <div class="chart-legend">
                        <span class="legend-item active"><i></i> Penjualan</span>
                        <span class="legend-item"><i></i> Target</span>
                    </div>
                </div>
                <canvas id="grafikPenjualan"></canvas>
            </div>

            <div class="chart-card">
                <div class="card-header">
                    <h3>Kategori Terpopuler</h3>
                </div>
                <canvas id="grafikKategori"></canvas>
            </div>
        </div>

        <!-- QUICK ACTIONS -->
        <div class="quick-actions">
            <h3>Aksi Cepat</h3>
            <div class="action-buttons">
                <button class="action-btn primary">
                    <i class="fas fa-plus"></i>
                    Tambah Barang
                </button>
                <button class="action-btn success">
                    <i class="fas fa-sync-alt"></i>
                    Update Stok
                </button>
                <button class="action-btn warning">
                    <i class="fas fa-chart-bar"></i>
                    Lihat Laporan
                </button>
                <button class="action-btn secondary">
                    <i class="fas fa-print"></i>
                    Cetak Barcode
                </button>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
