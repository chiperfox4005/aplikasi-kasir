<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Database Produk</title>

<link rel="stylesheet" href="../../assets/style.css">
<link rel="stylesheet" href="../../assets/dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="sidebar-header">
<h2>TOKO SYSTEM</h2>
</div>

<nav class="sidebar-nav">

<button onclick="location.href='dashboard.html'" class="nav-item">
<i class="fas fa-chart-line"></i>
<span>Dashboard</span>
</button>

<button onclick="location.href='manajemen.html'" class="nav-item">
<i class="fas fa-box"></i>
<span>Manajemen Produk</span>
</button>

<button onclick="location.href='database.html'" class="nav-item active">
<i class="fas fa-database"></i>
<span>Database</span>
</button>

<button onclick="location.href='kategori.html'" class="nav-item">
<i class="fas fa-tags"></i>
<span>Kategori</span>
</button>

<button onclick="location.href='keuangan.html'" class="nav-item">
<i class="fas fa-chart-pie"></i>
<span>Keuangan</span>
</button>

</nav>
</div>

<!-- MAIN -->
<div class="main">

<div class="welcome-section">
<h1>Database Produk</h1>
<p>Kelola data produk toko</p>
</div>

<div class="card modern-form">

<!-- FORM KIRI -->
<div class="form-left">
<img id="previewFoto">
<input type="file" id="fotoProduk" accept="image/*">
</div>

<!-- FORM KANAN -->
<div class="form-right">

<h2>Tambah Produk</h2>

<input type="text" id="idProduk" placeholder="ID Produk (bebas)">
<input type="text" id="namaProduk" placeholder="Nama Produk">

<select id="kategoriProduk">
<option value="">⏳ Loading kategori...</option>
</select>

<select id="jenisProduk">
<option value="">⏳ Loading jenis...</option>
</select>

<textarea id="keteranganProduk" placeholder="Keterangan"></textarea>

<input type="number" id="hargaProduk" placeholder="Harga Jual">

<input type="number" id="stokProduk" placeholder="Stok">

<label>Minimum Stok</label>

<input type="number" id="minStokProduk" value="2" min="0" max="99">

<div style="margin:10px 0;padding:10px;background:#f0f8ff;border-radius:5px;">
<button onclick="bukaKategori()" style="background:#FF9800;color:white;padding:5px 10px;">
Kelola Kategori
</button>
</div>

<button onclick="simpanProduk()" class="btn-primary">
Simpan Produk
</button>

</div>
</div>

</div>

<script src="database.js"></script>

</body>
</html>
