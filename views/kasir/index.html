<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>POS Modern</title>
<link rel="stylesheet" href="../../assets/style.css"></head>
<body>

<header class="navbar">
    <div class="logo">🛒 POS FIKRY</div>

    <input type="text" id="search" placeholder="Scan barcode / cari produk..." autofocus>

    <div class="cart-icon" onclick="toggleCart()">
        🛍
        <span id="cartCount">0</span>
    </div>
</header>

<main>
    <div class="product-grid" id="productGrid">
        <!-- Produk muncul di sini -->
    </div>
</main>

<!-- PANEL KERANJANG -->
<div class="cart-panel" id="cartPanel">
    <h2>Transaksi Aktif</h2>
    <div id="cartItems"></div>

    <div class="cart-footer">
        <h3>Total: Rp <span id="totalHarga">0</span></h3>
        <button class="btn-bayar" onclick="lanjutPembayaran()">Bayar</button>
    </div>
</div>
<script src="renderer.js"></script>
</body>
</html>
