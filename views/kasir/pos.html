<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>POS FIKRY PRO</title>
    <link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>POS FIKRY</h2>
        <button>Penjualan</button>
        <button>Lihat Stok</button>
        <button>Logout</button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <!-- AREA PRODUK -->
        <div class="produk-area" id="produkArea"></div>

        <!-- PANEL TRANSAKSI -->
        <div class="transaksi">
            <h3>TRANSAKSI AKTIF</h3>
            <div id="keranjang"></div>
            <div class="total" id="total">TOTAL: Rp 0</div>
            <button class="btn-bayar" id="btnBayar" disabled>
                Proses Pembayaran
            </button>
            <div class="struk" id="areaStruk" style="display:none;"></div>
        </div>

    </div>

    <!-- MODAL PEMBAYARAN -->
    <div class="modal" id="modalBayar">
    <div class="modal-content bayar-layout">

        <!-- KOLOM KIRI -->
        <div class="bayar-kiri">
            <h2 id="totalBayar">TOTAL: Rp 0</h2>

            <button class="metode-btn" data-metode="cash">💵 Cash</button>
            <button class="metode-btn" data-metode="qris">📱 QRIS</button>
            <button class="metode-btn" data-metode="bank">🏦 Bank</button>
        </div>

        <!-- KOLOM KANAN -->
        <div class="bayar-kanan">
            <div id="areaPembayaran"></div>
        </div>

    </div>
</div>

    <script src="pos.js"></script>
</body>
</html>
